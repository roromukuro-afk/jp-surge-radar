name: Validate
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SURGE_ENABLE_LLM: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: DB connection and schema
        run: python -m surge_radar.cli init-db
      - name: Quick pipeline smoke test
        run: python scripts/run_daily.py "5" "true" "true"
      - name: Summary
        if: always()
        run: python scripts/cloud_summary.py || true
