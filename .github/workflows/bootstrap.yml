name: Bootstrap (Initial Price Fetch)
on:
  workflow_dispatch:
    inputs:
      batch_start:
        description: "Start index in universe (0-based)"
        required: false
        default: "0"
        type: string
      batch_size:
        description: "Number of stocks per batch"
        required: false
        default: "500"
        type: string
      price_range:
        description: "Yahoo Finance range (2y / 1y / 6mo)"
        required: false
        default: "2y"
        type: string
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SURGE_ENABLE_LLM: "0"
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_ADMIN_EMAIL: ${{ secrets.VAPID_ADMIN_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt
      - name: Initialize DB schema
        run: python -m surge_radar.cli init-db
      - name: Bootstrap price data
        run: |
          python scripts/bootstrap_prices.py \
            "${{ inputs.batch_start }}" \
            "${{ inputs.batch_size }}" \
            "${{ inputs.price_range }}"
      - name: Run initial predict (after prices)
        run: python scripts/run_daily.py "" "false"
      - name: Summary
        if: always()
        run: python scripts/cloud_summary.py || true
