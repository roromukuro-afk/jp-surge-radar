name: Daily Pipeline
on:
  schedule:
    - cron: "40 7 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Stock limit for pipeline"
        required: false
        default: "300"
jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
      - name: Init DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m surge_radar.cli init-db
      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SURGE_ENABLE_LLM: "0"
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_ADMIN_EMAIL: ${{ secrets.VAPID_ADMIN_EMAIL }}
        run: python -m surge_radar.cli daily --limit ${{ github.event.inputs.limit || '300' }}
      - name: Show logs on failure
        if: failure()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
import os, sys
sys.path.insert(0, '.')
try:
    from surge_radar import db
    with db.cursor() as c:
        rows = c.execute('SELECT job,started_at,status,message FROM job_logs ORDER BY id DESC LIMIT 10').fetchall()
    for r in rows:
        print(r['job'], r['started_at'], r['status'], (r['message'] or '')[:200])
except Exception as e:
    print('log fetch failed:', e)
" || true
      - name: Summary
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
import os, sys
sys.path.insert(0, '.')
try:
    from surge_radar import queries
    ov = queries.overview()
    print('Materials:', ov['materials'], 'codes_today:', ov['mat_codes_today'])
    print('Teacher:', ov['teacher_total'], 'live_fail:', ov['live_fail'])
    print('Predictions today:', ov['cat_today'])
except Exception as e:
    print('summary failed:', e)
" || true
