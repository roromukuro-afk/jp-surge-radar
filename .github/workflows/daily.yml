name: Daily Pipeline
on:
  schedule:
    - cron: "40 7 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max stocks (blank=all ~3000)"
        required: false
        default: ""
        type: string
      skip_materials:
        description: "Skip materials step (true/false)"
        required: false
        default: "false"
        type: string
jobs:
  daily:
    runs-on: ubuntu-latest
    # 通常は最適化後 ~20-25分で完了。CIランナーの個体差に対する安全余裕として75分。
    timeout-minutes: 75
    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SURGE_ENABLE_LLM: "0"
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_ADMIN_EMAIL: ${{ secrets.VAPID_ADMIN_EMAIL }}
      # 未設定なら空文字 → EDINET取得はスキップ(理由をログ出力)。
      # 無料キーを GitHub Secret に設定すると EDINET 材料が自動で入る。
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt
      - name: Initialize DB schema
        run: python -m surge_radar.cli init-db
      - name: Run daily pipeline
        run: python scripts/run_daily.py "${{ inputs.limit }}" "${{ inputs.skip_materials }}"
      - name: Show logs on failure
        if: failure()
        run: python scripts/cloud_logs.py || true
      - name: Summary
        if: always()
        run: python scripts/cloud_summary.py || true
