name: Daily Pipeline
on:
  schedule:
    - cron: "40 7 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max stocks to process"
        required: false
        default: "300"
        type: string
jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize DB schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m surge_radar.cli init-db
      - name: Run daily pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SURGE_ENABLE_LLM: "0"
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_ADMIN_EMAIL: ${{ secrets.VAPID_ADMIN_EMAIL }}
        run: python -m surge_radar.cli daily --limit ${{ inputs.limit || '300' }}
      - name: Show logs on failure
        if: failure()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/cloud_logs.py || true
      - name: Summary
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/cloud_summary.py || true
